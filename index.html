<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chicago Climate Week (ChiCW) Calendar</title>
<style>
  :root {
    --bg: #fbfaf7;
    --ink: #1f2a24;
    --muted: #6b7a72;
    --line: #e4e2d8;
    --line-strong: #d2cfc2;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 28px 24px 48px;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 { font-size: 20px; font-weight: 600; margin: 0 0 4px; width: calc(var(--gutter-px) + (var(--day-width-px) * 3)); box-sizing: border-box; }
  .subtitle { color: var(--muted); font-size: 13px; margin-bottom: 16px; width: calc(var(--gutter-px) + (var(--day-width-px) * 3)); box-sizing: border-box; }

  .filter-bar {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 18px;
    padding: 10px 12px;
    background: #fff;
    border: 1px solid var(--line-strong);
    border-radius: 10px;
    width: calc(var(--gutter-px) + (var(--day-width-px) * 3));
    box-sizing: border-box;
  }
  .filter-label { font-size: 12px; font-weight: 600; color: var(--muted); margin-right: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  .filter-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 12px;
    border-radius: 999px;
    border: 1.5px solid var(--line-strong);
    background: #fff;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--ink);
    cursor: pointer;
    user-select: none;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
  }
  .filter-chip input { position: absolute; opacity: 0; width: 0; height: 0; }
  .filter-chip .checkmark { display: none; font-weight: 700; margin-right: 2px; }
  .filter-chip input:checked ~ .checkmark { display: inline; }
  .filter-chip input:checked ~ .label { font-weight: 700; }
  .filter-chip:hover { border-color: #b9b5a4; }
  .filter-chip input:checked { 
    display: none;
  }
  .filter-chip.checked { 
    background: #1f2a24; 
    color: #fff; 
    border-color: #1f2a24;
  }
  .filter-count { font-size: 11.5px; color: var(--muted); margin-left: 4px; }
  .filter-clear {
    margin-left: auto;
    border: none; background: none; color: var(--muted);
    font-size: 12px; text-decoration: underline; cursor: pointer; padding: 4px 6px;
  }
  .filter-clear:hover { color: var(--ink); }

  .day-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0;
    margin-bottom: 0;
    position: relative;
    margin-bottom: 16px;
    width: calc(var(--gutter-px) + (var(--day-width-px) * 3));
    box-sizing: border-box;
  }
  .day-nav-arrow {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    border: 2px solid var(--line-strong);
    background: #fff;
    font-size: 24px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--ink);
    transition: background 0.12s, border-color 0.12s;
    padding: 0;
    flex: 0 0 auto;
  }
  .day-nav-arrow:hover { background: #f0ede0; border-color: #b9b5a4; }
  .day-nav-arrow.is-hidden { visibility: hidden; }
  .day-nav-label { font-size: 13px; font-weight: 600; color: var(--ink); flex: 1; text-align: center; }

  .schedule-wrap {
    overflow: hidden;
    border: 1px solid var(--line-strong);
    border-radius: 10px;
    background: #fff;
    width: calc(var(--gutter-px) + (var(--day-width-px) * 3));
  }
  .schedule-flex { display: flex; min-width: max-content; width: calc(var(--gutter-px) + (var(--day-width-px) * 3)); }

  .gutter { width: var(--gutter-px); flex-shrink: 0; flex-grow: 0; position: sticky; left: 0; z-index: 6; background: #fff; }
  .gutter-header { height: 56px; border-bottom: 1px solid var(--line-strong); border-right: 1px solid var(--line-strong); background: #fff; }
  .gutter-allday { height: 30px; border-bottom: 1px solid var(--line-strong); border-right: 1px solid var(--line-strong); }
  .gutter-body { position: relative; border-right: 1px solid var(--line-strong); }
  .hour-label {
    position: absolute; right: 6px; transform: translateY(-50%);
    font-size: 11px; color: var(--muted); white-space: nowrap;
  }

  .day-col { width: var(--day-width-px); flex-shrink: 0; flex-grow: 0; border-right: 2px solid var(--line-strong); }
  .day-header {
    height: 56px; position: sticky; top: 0; z-index: 5; background: #fff;
    border-bottom: 1px solid var(--line-strong);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .day-header .dow { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .day-header .num { font-size: 14px; font-weight: 600; }
  .day-allday { height: 30px; border-bottom: 1px solid var(--line-strong); padding: 3px 4px; display: flex; gap: 4px; overflow: hidden; max-width: var(--day-width-px); box-sizing: border-box; }
  .allday-pill {
    background: #f0ede0; color: #6b5a22; font-size: 10px; font-weight: 600;
    padding: 2px 6px; border-radius: 5px; white-space: nowrap; overflow: hidden;
    text-overflow: ellipsis; max-width: 100%;
  }
  .day-body { position: relative; }

  .event-block {
    position: absolute;
    border-radius: 6px;
    overflow: hidden;
    padding: 5px 7px;
    font-size: 11px;
    line-height: 1.3;
    cursor: pointer;
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.25), 0 0 0 1px rgba(0,0,0,0.06);
    transition: box-shadow 0.12s;
  }
  .event-block:hover { box-shadow: inset 0 0 0 1px rgba(255,255,255,0.4), 0 0 0 1.5px rgba(0,0,0,0.18); }
  .event-block .et-title { font-weight: 600; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .event-block .et-time { display: block; opacity: 0.85; font-size: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .tooltip {
    position: fixed;
    pointer-events: none;
    background: #1f2a24;
    color: #fff;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 12px;
    line-height: 1.5;
    max-width: 280px;
    z-index: 20;
    display: none;
    box-shadow: 0 8px 20px rgba(0,0,0,0.22);
  }
  .tooltip strong { display: block; margin-bottom: 3px; font-size: 13px; }
  .tooltip .tt-time { color: #cfe3d4; margin-bottom: 4px; display: block; }
  .tooltip .tt-loc { color: #d8d6cc; display: block; }
  .tooltip .tt-tags { margin-top: 6px; display: flex; gap: 4px; flex-wrap: wrap; }
  .tooltip .tt-tag { background: rgba(255,255,255,0.18); padding: 2px 6px; border-radius: 5px; font-size: 10.5px; }
  .tooltip .tt-cta { margin-top: 6px; color: #cfe3d4; font-size: 11px; font-style: italic; }

  .footer { text-align: center; color: var(--muted); font-size: 11px; margin-top: 16px; }
</style>
</head>

  <div class="footer" id="footer"></div>
  <div class="tooltip" id="tooltip"></div>

      tooltip.innerHTML = `<strong>${ev.title}</strong>` +
        `<span class="tt-time">${ev.time_label}</span>` +
        (ev.host ? `<span class="tt-loc">Host: ${ev.host}</span>` : "") +
        (ev.location ? `<span class="tt-loc">${ev.location}</span>` : "") +
        tagsHtml +
        (ev.rsvpUrl ? `<span class="tt-cta">Click to RSVP →</span>` : "");
    });
    block.addEventListener("mouseleave", () => { tooltip.style.display = "none"; });
    block.addEventListener("click", () => {
      if (ev.rsvpUrl) window.open(ev.rsvpUrl, "_blank", "noopener");
    });

    body.appendChild(block);
    dayList.push({ hstart: ev.hstart, hend: ev.hend, tags: ev.tags, _el: block });
  });

  col.appendChild(body);
  flex.appendChild(col);
  dayEventLists.push(dayList);
  dayCols.push(col);
});

// ---- 3-day windowed paging --------------------------------------------
const DAY_WINDOW_SIZE = 3;
let dayOffset = 3;  // Start at July 18 (4th day, index 3)
const prevDayBtn = document.getElementById("prevDayBtn");
const nextDayBtn = document.getElementById("nextDayBtn");
const dayNavLabel = document.getElementById("dayNavLabel");

function updateDayWindow() {
  dayCols.forEach((col, idx) => {
    col.style.display = (idx >= dayOffset && idx < dayOffset + DAY_WINDOW_SIZE) ? "" : "none";
  });
  prevDayBtn.classList.toggle("is-hidden", dayOffset === 0);
  prevDayBtn.disabled = dayOffset === 0;
  const atEnd = dayOffset + DAY_WINDOW_SIZE >= dayCols.length;
  nextDayBtn.classList.toggle("is-hidden", atEnd);
  nextDayBtn.disabled = atEnd;
  const lastIdx = Math.min(dayOffset + DAY_WINDOW_SIZE, dayCols.length) - 1;
  dayNavLabel.textContent = dayOffset === lastIdx
    ? DATA.dayNums[dayOffset]
    : `${DATA.dayNums[dayOffset]} – ${DATA.dayNums[lastIdx]}`;
}
prevDayBtn.addEventListener("click", () => {
  if (dayOffset > 0) { dayOffset -= 1; updateDayWindow(); }
});
nextDayBtn.addEventListener("click", () => {
  if (dayOffset + DAY_WINDOW_SIZE < dayCols.length) { dayOffset += 1; updateDayWindow(); }
});
updateDayWindow();

// ---- Layout / filtering ----------------------------------------------
function clusterAndPack(events) {
  const sorted = [...events].sort((a, b) => a.hstart - b.hstart);
  const clusters = [];
  let cur = [], curMaxEnd = null;
  for (const ev of sorted) {
    if (cur.length && ev.hstart >= curMaxEnd) {
      clusters.push(cur);
      cur = [];
      curMaxEnd = null;
    }
    cur.push(ev);
    curMaxEnd = curMaxEnd === null ? ev.hend : Math.max(curMaxEnd, ev.hend);
  }
  if (cur.length) clusters.push(cur);

  for (const cluster of clusters) {
    const trackEnd = [];
    for (const ev of cluster) {
      let placed = false;
      for (let i = 0; i < trackEnd.length; i++) {
        if (trackEnd[i] <= ev.hstart + 1e-9) {
          trackEnd[i] = ev.hend;
          ev._track = i;
          placed = true;
          break;
        }
      }
      if (!placed) {
        trackEnd.push(ev.hend);
        ev._track = trackEnd.length - 1;
      }
    }
    for (const ev of cluster) ev._tracksInCluster = trackEnd.length;
  }
  return sorted;
}

function matchesActiveTags(ev) {
  if (activeTags.size === 0) return true;
  for (const t of activeTags) {
    if (!ev.tags.includes(t)) return false;
  }
  return true;
}

function applyFilters() {
  let visibleTotal = 0, hiddenTotal = 0;
  dayEventLists.forEach(dayList => {
    const visible = dayList.filter(matchesActiveTags);
    const hidden = dayList.filter(ev => !matchesActiveTags(ev));
    hidden.forEach(ev => { ev._el.style.display = "none"; });
    hiddenTotal += hidden.length;

    clusterAndPack(visible);
    visible.forEach(ev => {
      const top = (ev.hstart - DATA.displayStartHour) * DATA.hourPx;
      const height = Math.max((ev.hend - ev.hstart) * DATA.hourPx - 2, 16);
      const widthPct = 100 / ev._tracksInCluster;
      ev._el.style.display = "block";
      ev._el.style.top = top + "px";
      ev._el.style.height = height + "px";
      ev._el.style.left = `calc(${ev._track * widthPct}% + 2px)`;
      ev._el.style.width = `calc(${widthPct}% - 4px)`;
    });
    visibleTotal += visible.length;
  });

  filterCount.textContent = activeTags.size === 0
    ? `Showing all ${visibleTotal} events`
    : `Showing ${visibleTotal} of ${visibleTotal + hiddenTotal} events`;
}

applyFilters();
</script>
